<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador examen vial</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --warning: #f1c40f;
            --bg: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 750px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        h1 { text-align: center; color: var(--primary); font-size: 1.8rem; }
        
        #setup-screen, #result-screen { text-align: center; padding: 30px 0; }
        
        .btn-main {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .btn-main:hover:not(:disabled) { background: #2980b9; transform: translateY(-2px); }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
        
        select {
            padding: 10px;
            width: 200px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
        }

        .question-card { margin-top: 20px; }
        .question-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .sign-img {
            display: block;
            margin: 0 auto 20px;
            max-width: 180px;
            height: auto;
            border-radius: 10px;
            border: 4px solid #f0f0f0;
        }

        .options-grid { display: grid; gap: 12px; }
        .opt-btn {
            padding: 18px;
            border: 2px solid #edf0f2;
            border-radius: 12px;
            background: #fff;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #f7fbfe; }
        .opt-letter {
            background: #eee;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 15px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .feedback-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.4s;
        }
        .feedback-title { font-weight: 800; margin-bottom: 8px; font-size: 1.1rem; }
        .feedback-reason { font-size: 0.95rem; line-height: 1.5; color: #444; }

        /* Animación de "salto" o pulsación */
@keyframes popIn {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1.03); }
}

/* Estado Correcto: Forzamos el color del texto y la animación */
.correct { 
    border-color: var(--success) !important; 
    background: #e9f7ef !important; 
    color: #155724 !important; /* Verde oscuro para que se lea perfecto */
    font-weight: 800 !important;
    opacity: 1 !important; /* Evita que se ponga gris al deshabilitarse */
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    z-index: 10;
    box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
}

/* Estado Incorrecto: Para que también sea legible */
.incorrect { 
    border-color: var(--error) !important; 
    background: #fdf2f2 !important; 
    color: #721c24 !important; /* Rojo oscuro */
    opacity: 0.8 !important;
    transform: scale(0.98); /* Pequeña contracción para diferenciarla */
}

/* Regla vital: Forzar visibilidad en botones deshabilitados */
.opt-btn:disabled {
    cursor: default;
    color: #444; /* Color base para las opciones que no elegiste */
}

        .progress-container { background: #eee; height: 10px; border-radius: 5px; margin-bottom: 30px; }
        .progress-fill { background: var(--success); height: 100%; width: 0%; border-radius: 5px; transition: 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

    // --- CARGA DE DATOS LOCALES ---
function loadExternalData() {
    // Verificamos si la variable del archivo js/señales.js existe
    if (typeof datosSeñales !== 'undefined') {
        señalesJSON = datosSeñales;
        
        // Mostrar controles de inmediato
        document.getElementById('loading-text').style.display = 'none';

    // Función para obtener la cuota exacta de señales
function getRequiredSignals(json) {
    if (!json) return [];
    
    const allTitles = Object.values(json).map(s => s.title);
    const selectedQuestions = [];
    
    // Definimos la configuración de preguntas
    const quota = [
        { cat: 'preventivas', amount: 3 },
        { cat: 'restrictivas', amount: 3 },
        { cat: 'informativas', amount: 3 },
        { cat: 'obra', amount: 1 }
    ];

    // Agrupamos el JSON por categorías para facilitar la extracción
    const byCategory = {};
    Object.values(json).forEach(item => {
        const c = item.category.toLowerCase();
        if (!byCategory[c]) byCategory[c] = [];
        byCategory[c].push(item);
    });

    // Extraemos según la cuota
    quota.forEach(q => {
        if (byCategory[q.cat]) {
            const picked = shuffle([...byCategory[q.cat]]).slice(0, q.amount);
            picked.forEach(s => {
                const incorrect = shuffle(allTitles.filter(t => t !== s.title)).slice(0, 2);
                selectedQuestions.push({
                    q: `Identifica esta señal de tipo ${s.category.toUpperCase()}:`,
                    img: s.images[0].src,
                    ok: s.title,
                    bad: incorrect,
                    why: s.description
                });
            });
        }
    });

    return selectedQuestions;
}

async function startQuiz() {
    if (!señalesJSON) await loadExternalData();

    const textCount = parseInt(document.getElementById('question-count').value);
    
    // 1. Obtenemos las preguntas de texto (según selección del usuario)
    const textQuestions = shuffle([...database]).slice(0, textCount);

    // 2. Obtenemos las 10 señales fijas (3+3+3+1)
    const signalQuestions = getRequiredSignals(señalesJSON);

    // 3. Unimos ambos grupos (El total será: seleccionadas + 10 señales)
    // Usamos shuffle al final para que aparezcan mezcladas entre sí
    quizSet = shuffle([...textQuestions, ...signalQuestions]);

    console.log(`Total de preguntas: ${quizSet.length} (${textQuestions.length} texto + ${signalQuestions.length} señales)`);

    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'block';
    
    currentPos = 0;
    score = 0;
    renderQuestion();
}

    function renderQuestion() {
        const data = quizSet[currentPos];
        const options = shuffle([data.ok, ...data.bad]);
        const letters = ['A', 'B', 'C'];
        
        let html = `
            <div class="question-card">
                <div class="question-text">${currentPos + 1}. ${data.q}</div>
                ${data.img ? `<img src="${data.img}" class="sign-img">` : ''}
                <div class="options-grid">
        `;

        options.forEach((opt, i) => {
            html += `
                <button class="opt-btn" onclick="validate(this, '${opt === data.ok}')">
                    <span class="opt-letter">${letters[i]}</span>
                    <span>${opt}</span>
                </button>
            `;
        });

        html += `</div><div id="feedback" class="feedback-box"></div></div>`;
        document.getElementById('question-content').innerHTML = html;
        document.getElementById('next-btn').style.display = 'none';
        updateProgress();
    }

    window.validate = function(btn, isCorrect) {
        const buttons = document.querySelectorAll('.opt-btn');
        const feedback = document.getElementById('feedback');
        const data = quizSet[currentPos];
        
        buttons.forEach(b => b.disabled = true);

        if (isCorrect === "true") {
            btn.classList.add('correct');
            feedback.style.background = "#e9f7ef";
            feedback.style.borderLeft = "5px solid var(--success)";
            feedback.innerHTML = `
                <div class="feedback-title" style="color:var(--success)">✅ ¡CORRECTO!</div>
                <div class="feedback-reason"><strong>Explicación:</strong> ${data.why}</div>
            `;
            score++;
        } else {
            btn.classList.add('incorrect');
            buttons.forEach(b => { if(b.innerText.includes(data.ok)) b.classList.add('correct'); });
            feedback.style.background = "#fdf2f2";
            feedback.style.borderLeft = "5px solid var(--error)";
            feedback.innerHTML = `
                <div class="feedback-title" style="color:var(--error)">❌ INCORRECTO</div>
                <div class="feedback-reason">La respuesta era: ${data.ok}.<br><br><strong>¿Por qué?</strong> ${data.why}</div>
            `;
        }

        feedback.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    };

    function loadNext() {
        currentPos++;
        if (currentPos < quizSet.length) {
            renderQuestion();
        } else {
            showFinal();
        }
    }

    function updateProgress() {
        const prg = (currentPos / quizSet.length) * 100;
        document.getElementById('progress-fill').style.width = prg + "%";
    }

    function showFinal() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        const percent = Math.round((score / quizSet.length) * 100);
        document.getElementById('final-score').innerText = percent + "%";
        
        if(percent >= 80) {
            document.getElementById('result-title').innerText = "¡Felicidades, Aprobado! 🚗";
            document.getElementById('result-text').innerText = "Excelente conocimiento.";
        } else {
            document.getElementById('result-title').innerText = "Necesitas Repasar 📋";
            document.getElementById('result-text').innerText = "Sigue practicando para obtener tu licencia.";
        }
    }

    // Iniciar carga al cargar la página
    loadExternalData();
</script>
