<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educación Vial</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --text: #ffffff;
            --bg-gradient: linear-gradient(135deg, #1e2a38 0%, #3b4d61 100%);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            display: inline-block;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .btn {
            text-decoration: none;
            color: var(--text);
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
            border-color: transparent;
        }

        .btn-simulador {
            border-left: 5px solid #e74c3c; /* Un toque rojo para el examen */
        }

        .btn-senales {
            border-left: 5px solid #f1c40f; /* Un toque amarillo para señales */
        }

        span.icon {
            margin-right: 10px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Educación Vial</h1>
        
        <div class="button-group">
            <a href="ARCHIVOS/SIMULADOR 2.HTML" class="btn btn-simulador">
                <span class="icon">📝</span> Simulador de Examen
            </a>
            
            <a href="ARCHIVOS/señales.html" class="btn btn-senales">
                <span class="icon">🛑</span> Señalamientos
            </a>
        </div>
    </div>

</body>
</html>
